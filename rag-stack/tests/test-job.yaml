apiVersion: batch/v1
kind: Job
metadata:
  name: rag-integration-test
  namespace: rag-system
spec:
  template:
    spec:
      enableServiceLinks: false
      containers:
      - name: tester
        image: registry.container-registry.svc.cluster.local:5000/rag-test-runner:__VERSION__
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "--- Running Integration Tests ---"
            python /tests/integration_test.py
            echo "--- Running Recursive RAG Flow Tests ---"
            python /tests/recursive_rag_test.py
            echo "--- Running Pulsar CRUD Tests ---"
            python /tests/pulsar_crud_test.py
            echo "--- Seeding Qdrant Context ---"
            python /tests/seed_qdrant_context.py
            echo "--- Running Context Verification (Query) ---"
            python /tests/context_verification.py --query-only
            echo "--- Running Sad Path Tests ---"
            python /tests/sad_path_test.py
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: S3_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_HOST
        - name: BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_NAME
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_SECRET_ACCESS_KEY
        - name: QDRANT_HOST
          value: "qdrant"
        - name: GATEWAY_URL
          value: "http://llm-gateway.rag-system.svc.cluster.local/v1/chat/completions"
        - name: PULSAR_URL
          value: "pulsar://pulsar-proxy.apache-pulsar.svc.cluster.local:6650"
        - name: PULSAR_PROMPT_TOPIC
          value: "persistent://rag-pipeline/data/chat-prompts"
        - name: PULSAR_RESPONSE_TOPIC
          value: "persistent://rag-pipeline/stage/results"
        - name: PULSAR_INGRESS_TOPIC
          value: "persistent://rag-pipeline/stage/ingress"
        - name: PULSAR_RESULTS_TOPIC
          value: "persistent://rag-pipeline/stage/results"
        - name: PULSAR_STATUS_TOPIC
          value: "persistent://rag-pipeline/stage/status"
        - name: PULSAR_DB_OPS_TOPIC
          value: "persistent://rag-pipeline/operations/db-ops"
        - name: PULSAR_QDRANT_OPS_TOPIC
          value: "persistent://rag-pipeline/operations/qdrant-ops"
        - name: PULSAR_QDRANT_RESULTS_TOPIC
          value: "persistent://rag-pipeline/operations/qdrant-ops-results"
        envFrom:
        - configMapRef:
            name: apm-config
            optional: true
        volumeMounts:
        - name: tests
          mountPath: /tests
      volumes:
      - name: tests
        configMap:
          name: rag-integration-tests
      restartPolicy: Never
  backoffLimit: 0
