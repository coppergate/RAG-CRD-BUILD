apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-ingestion-service
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-ingestion-service
  template:
    metadata:
      labels:
        app: rag-ingestion-service
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
      - name: ingestor
        image: registry.container-registry.svc.cluster.local:5000/rag-ingestion:__VERSION__
        imagePullPolicy: Always
        command: ["python", "service.py"]
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
            scheme: HTTPS
          initialDelaySeconds: 45
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "3Gi"
        env:
        - name: OLLAMA_URL
          value: "http://ollama.llms-ollama.svc.cluster.local:11434"
        - name: OLLAMA_MODEL
          value: "llama3.1:latest"
        - name: PULSAR_URL
          value: "pulsar+ssl://pulsar-proxy.apache-pulsar.svc.cluster.local:6651"
        - name: TLS_CERT
          value: "/etc/ssl/certs/tls.crt"
        - name: TLS_KEY
          value: "/etc/ssl/certs/tls.key"
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: QDRANT_HOST
          value: "qdrant"
        - name: QDRANT_COLLECTION
          value: "vectors"
        - name: INGEST_BATCH_SIZE
          value: "20"
        - name: CHUNK_SIZE
          value: "1000"
        - name: S3_ENDPOINT
          value: "https://rook-ceph-rgw-ceph-object-store.rook-ceph.svc"
        - name: BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_NAME
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_SECRET_ACCESS_KEY
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: REQUESTS_CA_BUNDLE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: AWS_CA_BUNDLE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: OTEL_USE_TLS
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "https://otel-collector.monitoring.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_CERTIFICATE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: BUCKET_PORT
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_PORT
        volumeMounts:
        - name: registry-ca
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.crt
          subPath: tls.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.key
          subPath: tls.key
      volumes:
      - name: registry-ca
        configMap:
          name: registry-ca-cm
      - name: service-tls
        secret:
          secretName: rag-ingestion-tls
---
apiVersion: v1
kind: Service
metadata:
  name: rag-ingestion-service
  namespace: rag-system
spec:
  selector:
    app: rag-ingestion-service
  ports:
  - port: 443
    targetPort: 8000
    name: https
