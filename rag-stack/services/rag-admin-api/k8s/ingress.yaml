apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-admin-api
  namespace: rag-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: skip-verify@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - rag-admin-api.rag.hierocracy.home
      secretName: rag-admin-api-tls
  rules:
    - host: rag-admin-api.rag.hierocracy.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-admin-api
                port:
                  name: https
