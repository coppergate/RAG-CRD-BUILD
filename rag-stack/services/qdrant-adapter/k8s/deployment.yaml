apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-adapter
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant-adapter
  template:
    metadata:
      labels:
        app: qdrant-adapter
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
        - name: qdrant-adapter
          image: registry.container-registry.svc.cluster.local:5000/qdrant-adapter:__VERSION__
          imagePullPolicy: Always
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: PULSAR_URL
              value: pulsar://pulsar-proxy.apache-pulsar.svc.cluster.local:6650
            - name: PULSAR_QDRANT_OPS_TOPIC
              value: persistent://rag-pipeline/operations/qdrant-ops
            - name: PULSAR_QDRANT_RESULTS_TOPIC
              value: persistent://rag-pipeline/operations/qdrant-ops-results
            - name: QDRANT_HOST
              value: qdrant.rag-system.svc.cluster.local
            - name: QDRANT_PORT
              value: "6333"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          ports:
            - containerPort: 8080
