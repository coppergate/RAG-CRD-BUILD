apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant-adapter
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant-adapter
  template:
    metadata:
      labels:
        app: qdrant-adapter
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
        - name: qdrant-adapter
          image: registry.container-registry.svc.cluster.local:5000/qdrant-adapter:__VERSION__
          imagePullPolicy: Always
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTPS
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          env:
            - name: PULSAR_URL
              value: "pulsar+ssl://pulsar-proxy.apache-pulsar.svc.cluster.local:6651"
            - name: PULSAR_QDRANT_OPS_TOPIC
              value: persistent://rag-pipeline/operations/qdrant-ops
            - name: PULSAR_QDRANT_RESULTS_TOPIC
              value: persistent://rag-pipeline/operations/qdrant-ops-results
            - name: QDRANT_HOST
              value: qdrant.rag-system.svc.cluster.local
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_USE_TLS
              value: "true"
            - name: SSL_CERT_FILE
              value: "/etc/ssl/certs/ca-certificates.crt"
            - name: OTEL_USE_TLS
              value: "true"
            - name: TLS_CERT
              value: "/etc/ssl/certs/tls.crt"
            - name: TLS_KEY
              value: "/etc/ssl/certs/tls.key"
          volumeMounts:
            - name: registry-ca
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca.crt
            - name: service-tls
              mountPath: /etc/ssl/certs/tls.crt
              subPath: tls.crt
            - name: service-tls
              mountPath: /etc/ssl/certs/tls.key
              subPath: tls.key
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          ports:
            - containerPort: 8080
      volumes:
        - name: registry-ca
          configMap:
            name: registry-ca-cm
        - name: service-tls
          secret:
            secretName: qdrant-adapter-tls
