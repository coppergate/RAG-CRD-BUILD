apiVersion: v1
kind: ServiceAccount
metadata:
  name: rag-web-ui
  namespace: rag-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rag-web-ui-job-manager
  namespace: rag-system
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "delete", "watch"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rag-web-ui-job-manager-binding
  namespace: rag-system
subjects:
- kind: ServiceAccount
  name: rag-web-ui
  namespace: rag-system
roleRef:
  kind: Role
  name: rag-web-ui-job-manager
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-web-ui
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-web-ui
  template:
    metadata:
      labels:
        app: rag-web-ui
    spec:
      enableServiceLinks: false
      serviceAccountName: rag-web-ui
      containers:
      - name: web-ui
        image: registry.container-registry.svc.cluster.local:5000/rag-web-ui:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: S3_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_HOST
        - name: BUCKET_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-codebase-bucket
              key: BUCKET_NAME
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: rag-codebase-bucket
              key: AWS_SECRET_ACCESS_KEY
        - name: LLM_URL
          value: "http://llm-gateway.rag-system.svc.cluster.local/v1/chat/completions"
        - name: QDRANT_HOST
          value: "qdrant"
        - name: QDRANT_PORT
          value: "6333"
      volumes:
      - name: app-dir
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rag-web-ui
  namespace: rag-system
  annotations:
    purelb.io/service-group: default
spec:
  selector:
    app: rag-web-ui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer

