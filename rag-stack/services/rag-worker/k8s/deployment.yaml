apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
      - name: worker
        image: registry.container-registry.svc.cluster.local:5000/rag-worker:__VERSION__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTPS
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "300m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        envFrom:
        - configMapRef:
            name: pulsar-topic-config
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: QDRANT_HOST
          value: "qdrant"
        - name: PLANNER_URL
          value: "http://ollama.llms-ollama.svc.cluster.local:11434"
        - name: PLANNER_MODEL
          value: "llama3.1:latest"
        - name: EXECUTOR_URL
          value: "http://ollama-code.llms-ollama.svc.cluster.local:11434"
        - name: EXECUTOR_MODEL
          value: "granite3.1-dense:8b"
        - name: QDRANT_COLLECTION
          value: "vectors"
        - name: QDRANT_SEARCH_LIMIT
          value: "5"
        - name: QDRANT_SEARCH_TIMEOUT
          value: "30s"
        - name: RECURSION_BUDGET
          value: "2.0"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: OTEL_USE_TLS
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.monitoring.svc.cluster.local:4317"
        - name: TLS_CERT
          value: "/etc/ssl/certs/tls.crt"
        - name: TLS_KEY
          value: "/etc/ssl/certs/tls.key"
        volumeMounts:
        - name: registry-ca
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.crt
          subPath: tls.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.key
          subPath: tls.key
      volumes:
      - name: app-dir
        emptyDir: {}
      - name: registry-ca
        configMap:
          name: registry-ca-cm
      - name: service-tls
        secret:
          secretName: rag-worker-tls
          optional: true
