apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gateway
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-gateway
  template:
    metadata:
      labels:
        app: llm-gateway
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
      - name: gateway
        image: registry.container-registry.svc.cluster.local:5000/llm-gateway:__VERSION__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: PULSAR_URL
          value: "pulsar+ssl://pulsar-proxy.apache-pulsar.svc.cluster.local:6651"
        - name: TLS_CERT
          value: "/etc/ssl/certs/tls.crt"
        - name: TLS_KEY
          value: "/etc/ssl/certs/tls.key"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: OTEL_USE_TLS
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.monitoring.svc.cluster.local:4317"
        - name: REQUEST_TIMEOUT
          value: "120s"
        envFrom:
        - configMapRef:
            name: llm-gateway-config
        volumeMounts:
        - name: registry-ca
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.crt
          subPath: tls.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.key
          subPath: tls.key
      volumes:
      - name: app-dir
        emptyDir: {}
      - name: registry-ca
        configMap:
          name: registry-ca-cm
      - name: service-tls
        secret:
          secretName: llm-gateway-tls
---
apiVersion: v1
kind: Service
metadata:
  name: llm-gateway
  namespace: rag-system
spec:
  selector:
    app: llm-gateway
  ports:
  - port: 443
    targetPort: 8080
    name: https
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-gateway
  namespace: rag-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/service.serversscheme: https
    traefik.ingress.kubernetes.io/service.serverstransport: skip-verify@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - gateway.hierocracy.home
    secretName: llm-gateway-tls
  rules:
  - host: gateway.hierocracy.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: llm-gateway
            port:
              name: https
