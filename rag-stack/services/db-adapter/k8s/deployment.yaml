apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-adapter
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-adapter
  template:
    metadata:
      labels:
        app: db-adapter
    spec:
      nodeSelector:
        role: storage-node
      enableServiceLinks: false
      containers:
      - name: adapter
        image: registry.hierocracy.home:5000/db-adapter:__VERSION__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: PULSAR_URL
          value: "pulsar://pulsar-proxy.apache-pulsar.svc.cluster.local:6650"
        - name: PULSAR_PROMPT_TOPIC
          value: "persistent://rag-pipeline/data/chat-prompts"
        - name: PULSAR_RESPONSE_TOPIC
          value: "persistent://rag-pipeline/stage/results"
        - name: PULSAR_DB_OPS_TOPIC
          value: "persistent://rag-pipeline/operations/db-ops"
        # Removed dev-only source ConfigMap mount. Images are the deployment artifact.
