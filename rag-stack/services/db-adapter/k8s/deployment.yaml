apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-adapter
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-adapter
  template:
    metadata:
      labels:
        app: db-adapter
    spec:
      containers:
      - name: adapter
        image: registry.container-registry.svc.cluster.local:5000/db-adapter:1.0.0
        imagePullPolicy: Always
        env:
        - name: DB_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: timescaledb-secret
              key: url
        - name: PULSAR_URL
          value: "pulsar://pulsar-proxy.apache-pulsar.svc.cluster.local:6650"
        - name: PULSAR_PROMPT_TOPIC
          value: "persistent://rag-pipeline/data/chat-prompts"
        - name: PULSAR_RESPONSE_TOPIC
          value: "persistent://rag-pipeline/data/chat-responses"
        - name: PULSAR_DB_OPS_TOPIC
          value: "persistent://rag-pipeline/operations/db-ops"
        # Removed dev-only source ConfigMap mount. Images are the deployment artifact.
