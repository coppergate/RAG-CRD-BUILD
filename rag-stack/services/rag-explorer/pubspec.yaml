publish_to: 'none'

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  dio: ^5.3.2
  go_router: ^17.2.0
  shared_preferences: ^2.2.1
