apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-explorer
  namespace: rag-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-explorer
  template:
    metadata:
      labels:
        app: rag-explorer
    spec:
      nodeSelector:
        role: storage-node
      containers:
      - name: ui
        image: registry.container-registry.svc.cluster.local:5000/rag-explorer:__VERSION__
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /index.html
            port: 8080
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /index.html
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /index.html
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-explorer
  namespace: rag-system
spec:
  selector:
    app: rag-explorer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-explorer
  namespace: rag-system
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  tls:
  - hosts:
    - rag-explorer.rag.hierocracy.home
    secretName: rag-explorer-tls
  rules:
  - host: rag-explorer.rag.hierocracy.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rag-explorer
            port:
              name: http
