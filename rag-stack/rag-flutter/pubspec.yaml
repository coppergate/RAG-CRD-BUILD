name: rag_explorer
description: RAG Pipeline Explorer UI
version: 1.7.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.3.6
  riverpod_annotation: ^2.1.1
  dio: ^5.3.2
  go_router: ^12.0.0
  shared_preferences: ^2.2.1
  flutter_markdown: ^0.6.17
  flutter_highlight: ^0.7.0
