  freezed_annotation: ^2.4.1
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  uuid: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.2
  json_serializable: ^6.7.1
