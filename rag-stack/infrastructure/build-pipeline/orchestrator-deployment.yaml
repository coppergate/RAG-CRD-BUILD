apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: build-orchestrator-cert
  namespace: build-pipeline
spec:
  secretName: build-orchestrator-tls
  duration: 8760h
  renewBefore: 720h
  subject:
    organizations:
      - Hierocracy
  commonName: build-orchestrator.build-pipeline.svc.cluster.local
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - build-orchestrator
    - build-orchestrator.build-pipeline
    - build-orchestrator.build-pipeline.svc
    - build-orchestrator.build-pipeline.svc.cluster.local
  issuerRef:
    name: hierocracy-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-orchestrator
  namespace: build-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-orchestrator
  template:
    metadata:
      labels:
        app: build-orchestrator
    spec:
      nodeSelector:
        role: storage-node
      serviceAccountName: build-orchestrator-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: orchestrator
        image: registry.hierocracy.home:5000/build-orchestrator:__VERSION__
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: INTERNAL_REGISTRY_ADDR
          value: "registry.container-registry.svc.cluster.local:5000"
        - name: EXTERNAL_REGISTRY_NAME
          value: "registry.container-registry.svc.cluster.local:5000"
        - name: PULSAR_URL
          value: "pulsar+ssl://pulsar-proxy.apache-pulsar.svc.cluster.local:6651"
        - name: BUILD_TOPIC
          value: "persistent://public/default/build-tasks"
        - name: BUILD_STATUS_TOPIC
          value: "persistent://public/default/build-status"
        - name: MAX_CONCURRENT_BUILDS
          value: "3"
        - name: MAX_TASK_RETRIES
          value: "2"
        - name: HTTP_ADDR
          value: ":8080"
        - name: HEALTH_ADDR
          value: ":8081"
        - name: FAILED_TASK_TOPIC
          value: "persistent://public/default/build-tasks-deadletter"
        - name: TLS_CERT
          value: "/etc/ssl/certs/tls.crt"
        - name: TLS_KEY
          value: "/etc/ssl/certs/tls.key"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        - name: OTEL_USE_TLS
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.monitoring.svc.cluster.local:4317"
        volumeMounts:
        - name: registry-ca
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.crt
          subPath: tls.crt
        - name: service-tls
          mountPath: /etc/ssl/certs/tls.key
          subPath: tls.key
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
            scheme: HTTPS
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 768Mi
      volumes:
      - name: registry-ca
        configMap:
          name: registry-ca-cm
      - name: service-tls
        secret:
          secretName: build-orchestrator-tls
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-orchestrator-sa
  namespace: build-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-orchestrator-role
  namespace: build-pipeline
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-orchestrator-rb
  namespace: build-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: build-orchestrator-role
subjects:
- kind: ServiceAccount
  name: build-orchestrator-sa
  namespace: build-pipeline
---
apiVersion: v1
kind: Service
metadata:
  name: build-orchestrator
  namespace: build-pipeline
spec:
  selector:
    app: build-orchestrator
  ports:
  - name: https
    port: 443
    targetPort: http
