apiVersion: apps/v1
kind: Deployment
metadata:
  name: build-orchestrator
  namespace: build-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: build-orchestrator
  template:
    metadata:
      labels:
        app: build-orchestrator
    spec:
      nodeSelector:
        role: storage-node
      serviceAccountName: build-orchestrator-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: orchestrator
        image: registry.hierocracy.home:5000/build-orchestrator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: INTERNAL_REGISTRY_ADDR
          value: "registry.container-registry.svc.cluster.local:5000"
        - name: EXTERNAL_REGISTRY_NAME
          value: "registry.hierocracy.home:5000"
        - name: PULSAR_URL
          value: "pulsar://pulsar-proxy.apache-pulsar.svc.cluster.local:6650"
        - name: BUILD_TOPIC
          value: "persistent://public/default/build-tasks"
        - name: BUILD_STATUS_TOPIC
          value: "persistent://public/default/build-status"
        - name: MAX_CONCURRENT_BUILDS
          value: "3"
        - name: MAX_TASK_RETRIES
          value: "2"
        - name: HTTP_ADDR
          value: ":8080"
        - name: FAILED_TASK_TOPIC
          value: "persistent://public/default/build-tasks-deadletter"
        - name: SSL_CERT_FILE
          value: "/etc/ssl/certs/ca-certificates.crt"
        volumeMounts:
        - name: registry-ca
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca.crt
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 768Mi
      volumes:
      - name: registry-ca
        configMap:
          name: registry-ca-cm
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: build-orchestrator-sa
  namespace: build-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: build-orchestrator-role
  namespace: build-pipeline
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: build-orchestrator-rb
  namespace: build-pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: build-orchestrator-role
subjects:
- kind: ServiceAccount
  name: build-orchestrator-sa
  namespace: build-pipeline
---
apiVersion: v1
kind: Service
metadata:
  name: build-orchestrator
  namespace: build-pipeline
spec:
  selector:
    app: build-orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: http
