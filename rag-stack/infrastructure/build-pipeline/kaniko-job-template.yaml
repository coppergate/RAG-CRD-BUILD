apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-build-${SERVICE_NAME}-${VERSION}
  namespace: build-pipeline
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      initContainers:
      - name: fetch-context
        image: registry.container-registry.svc.cluster.local:5000/busybox:1.37.0
        command: ["sh", "-c"]
        args: ["wget -O /workspace/context.tar.gz \"${SOURCE_URL}\" && tar -xzof /workspace/context.tar.gz -C /workspace && rm /workspace/context.tar.gz"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: registry-ca
          mountPath: /etc/ssl/certs/registry-ca.crt
          subPath: ca.crt
      containers:
      - name: kaniko
        image: registry.container-registry.svc.cluster.local:5000/martizih/kaniko:v1.27.0
        args:
        - "--dockerfile=${DOCKERFILE_PATH}"
        - "--context=dir:///workspace"
        - "--destination=${REGISTRY}/${SERVICE_NAME}:${VERSION}"
        - "--destination=${REGISTRY}/${SERVICE_NAME}:latest"
        - "--registry-certificate=${REGISTRY}=/kaniko/ssl/certs/registry-ca.crt"
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        - name: registry-ca
          mountPath: /kaniko/ssl/certs/registry-ca.crt
          subPath: ca.crt
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
      volumes:
      - name: workspace
        emptyDir: {}
      - name: registry-ca
        configMap:
          name: registry-ca-cm
      restartPolicy: Never
  backoffLimit: 1
