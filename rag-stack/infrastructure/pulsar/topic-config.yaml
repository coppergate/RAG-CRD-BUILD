apiVersion: v1
kind: ConfigMap
metadata:
  name: pulsar-topic-config
  namespace: rag-system
data:
  PULSAR_URL: "pulsar+ssl://pulsar-proxy.apache-pulsar.svc.cluster.local:6651"
  PULSAR_INGRESS_TOPIC: "persistent://rag-pipeline/stage/ingress"
  PULSAR_PLAN_TOPIC: "persistent://rag-pipeline/stage/plan"
  PULSAR_EXEC_TOPIC: "persistent://rag-pipeline/stage/exec"
  PULSAR_SEARCH_TOPIC: "persistent://rag-pipeline/stage/search"
  PULSAR_STATUS_TOPIC: "persistent://rag-pipeline/stage/status"
  PULSAR_RESULTS_TOPIC: "persistent://rag-pipeline/stage/results"
  PULSAR_COMPLETION_TOPIC: "persistent://rag-pipeline/stage/completion"
  PULSAR_PROMPT_TOPIC: "persistent://rag-pipeline/data/chat-prompts"
  PULSAR_RESPONSE_TOPIC: "persistent://rag-pipeline/stage/results"
  PULSAR_DB_OPS_TOPIC: "persistent://rag-pipeline/operations/db-ops"
  PULSAR_QDRANT_OPS_TOPIC: "persistent://rag-pipeline/operations/qdrant-ops"
  PULSAR_QDRANT_RESULTS_TOPIC: "persistent://rag-pipeline/operations/qdrant-ops-results"
