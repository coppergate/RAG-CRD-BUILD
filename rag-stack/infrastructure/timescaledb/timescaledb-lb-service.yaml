apiVersion: v1
kind: Service
metadata:
  name: timescaledb-external
  namespace: timescaledb
  annotations:
    purelb.io/addresspool: default
spec:
  selector:
    cnpg.io/cluster: timescaledb
    cnpg.io/instanceRole: primary
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: LoadBalancer
