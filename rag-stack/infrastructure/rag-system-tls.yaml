apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: llm-gateway-cert
  namespace: rag-system
spec:
  secretName: llm-gateway-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  subject:
    organizations:
      - Hierocracy
  commonName: llm-gateway.rag-system.svc.cluster.local
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - llm-gateway
    - llm-gateway.rag-system
    - llm-gateway.rag-system.svc
    - llm-gateway.rag-system.svc.cluster.local
    - gateway.hierocracy.home
    - gateway.hierocracy.home
  issuerRef:
    name: hierocracy-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
