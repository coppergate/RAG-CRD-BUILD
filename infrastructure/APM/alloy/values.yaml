alloy:
  configMap:
    create: true
    content: |
      logging {
        level = "info"
        format = "logfmt"
      }

      prometheus.exporter.unix "default" {
        set_collectors = ["cpu", "meminfo", "diskstats", "filesystem", "loadavg", "netdev"]
      }

      prometheus.scrape "default" {
        targets    = prometheus.exporter.unix.default.targets
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      // Scrape DCGM Exporter (GPUs)
      prometheus.scrape "dcgm" {
        targets = [
          {"__address__" = "dcgm-exporter.gpu-operator.svc.cluster.local:9400"},
        ]
        forward_to = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "15s"
      }

      // Scrape Apache Pulsar components (no PodMonitor/ServiceMonitor required)
      prometheus.scrape "pulsar" {
        targets = [
          {"__address__" = "pulsar-zookeeper.apache-pulsar.svc.cluster.local:8000"},
          {"__address__" = "pulsar-bookie.apache-pulsar.svc.cluster.local:8000"},
          {"__address__" = "pulsar-recovery.apache-pulsar.svc.cluster.local:8000"},
          {"__address__" = "pulsar-broker.apache-pulsar.svc.cluster.local:8080"},
          {"__address__" = "pulsar-proxy.apache-pulsar.svc.cluster.local:8080"},
        ]
        forward_to = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "30s"
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "http://mimir-gateway.monitoring.svc.cluster.local/api/v1/push"
        }
      }

      // Collect Kubernetes logs
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.loki.receiver]
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
        }
      }

controller:
  type: daemonset
  replicas: 1
