alloy:
  configMap:
    create: true
    content: |
      logging {
        level = "info"
        format = "logfmt"
      }

      prometheus.exporter.unix "default" {
        set_collectors = ["cpu", "meminfo", "diskstats", "filesystem", "loadavg", "netdev"]
      }

      prometheus.scrape "default" {
        targets    = prometheus.exporter.unix.default.targets
        forward_to = [prometheus.remote_write.mimir.receiver]
      }

      // Scrape DCGM Exporter (GPUs) via local pod discovery to avoid out-of-order samples
      discovery.kubernetes "dcgm" {
        role = "pod"
        namespaces {
          names = ["gpu-operator"]
        }
      }

      discovery.relabel "dcgm" {
        targets = discovery.kubernetes.dcgm.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex         = sys.env("HOSTNAME")
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "nvidia-dcgm-exporter"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "instance"
        }
      }

      prometheus.scrape "dcgm" {
        targets    = discovery.relabel.dcgm.output
        forward_to = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "15s"
      }

      // Scrape Apache Pulsar components via local pod discovery
      discovery.kubernetes "pulsar" {
        role = "pod"
        namespaces {
          names = ["apache-pulsar"]
        }
      }

      discovery.relabel "pulsar" {
        targets = discovery.kubernetes.pulsar.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          regex         = sys.env("HOSTNAME")
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          regex         = "pulsar"
          action        = "keep"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_component"]
          target_label  = "__tmp_port"
        }
        rule {
          source_labels = ["__tmp_port"]
          regex         = "(broker|proxy)"
          replacement   = "8080"
          target_label  = "__tmp_port_actual"
        }
        rule {
          source_labels = ["__tmp_port"]
          regex         = "(zookeeper|bookie|recovery)"
          replacement   = "8000"
          target_label  = "__tmp_port_actual"
        }
        rule {
          source_labels = ["__address__", "__tmp_port_actual"]
          separator     = ":"
          regex         = "(.+):(.+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_component"]
          target_label  = "component"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_cluster"]
          target_label  = "cluster"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "instance"
        }
      }

      prometheus.scrape "pulsar" {
        targets    = discovery.relabel.pulsar.output
        forward_to = [prometheus.remote_write.mimir.receiver]
        scrape_interval = "30s"
      }

      prometheus.remote_write "mimir" {
        endpoint {
          url = "https://mimir-gateway.monitoring.svc.cluster.local/api/v1/push"
          tls_config {
            ca_file = "/etc/ssl/certs/ca.crt"
            insecure_skip_verify = true
          }
        }
      }

      // Collect Kubernetes logs
      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.pods.output
        forward_to = [loki.write.loki.receiver]
      }

      discovery.relabel "pods" {
        targets = discovery.kubernetes.pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      loki.write "loki" {
        endpoint {
          url = "https://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          tls_config {
            ca_file = "/etc/ssl/certs/ca.crt"
            insecure_skip_verify = true
          }
        }
      }

  mounts:
    extra:
      - name: registry-ca
        mountPath: /etc/ssl/certs/ca.crt
        subPath: ca.crt

controller:
  type: daemonset
  replicas: 1
  volumes:
    extra:
      - name: registry-ca
        configMap:
          name: registry-ca-cm
