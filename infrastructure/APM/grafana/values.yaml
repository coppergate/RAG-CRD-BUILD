nodeSelector:
  role: storage-node
enabled: true
adminPassword: admin
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: https://loki-gateway.monitoring.svc.cluster.local
      - name: Tempo
        type: tempo
        access: proxy
        url: https://tempo-gateway.monitoring.svc.cluster.local
      - name: Mimir
        type: mimir
        access: proxy
        url: https://mimir-gateway.monitoring.svc.cluster.local
      - name: Prometheus
        type: prometheus
        access: proxy
        url: https://mimir-gateway.monitoring.svc.cluster.local/prometheus
service:
  type: ClusterIP
ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - grafana.rag.local
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.rag.local
  path: /
persistence:
  enabled: true
  storageClassName: rook-ceph-block
  size: 5Gi
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
dashboards:
  default:
    nvidia-dcgm:
      gnetId: 12239
      revision: 2
      datasource: Prometheus
