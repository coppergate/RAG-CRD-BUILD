apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: central-grafana
  namespace: monitoring
  labels:
    dashboards: "true"
spec:
  config:
    log:
      mode: console
    auth.anonymous:
      enabled: "true"
      org_role: Admin
    security:
      admin_user: admin
      admin_password: admin
      allow_embedding: "true"
    rendering:
      server_url: http://localhost:8081/render
      callback_url: http://central-grafana-service.monitoring.svc:3000/
  service:
    spec:
      type: ClusterIP
  ingress:
    metadata:
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
    spec:
      ingressClassName: traefik
      rules:
        - host: grafana.rag.hierocracy.home
          http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: central-grafana-service
                    port:
                      number: 3000
      tls:
        - hosts:
            - grafana.rag.hierocracy.home
          secretName: grafana-tls
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: rook-ceph-block
  deployment:
    spec:
      template:
        spec:
          nodeSelector:
            role: storage-node
          containers:
            - name: image-renderer
              image: grafana/grafana-image-renderer:latest
              ports:
                - containerPort: 8081
---
apiVersion: grafana.integreatly.org/v1beta1
