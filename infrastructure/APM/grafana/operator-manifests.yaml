apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: timescaledb
  namespace: monitoring
spec:
  instanceSelector:
    matchLabels:
      dashboards: "true"
  datasource:
    name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb-external.timescaledb.svc.cluster.local:5432
    user: app
    database: app
    jsonData:
      sslmode: "disable"
      postgresVersion: 1600
      timescaledb: true
    secureJsonData:
      password: app
    isDefault: false
