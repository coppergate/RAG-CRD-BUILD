apiVersion: v1
kind: Secret
metadata:
  name: hierocracy-root-ca-secret
  namespace: cert-manager
type: kubernetes.io/tls
data:
  tls.crt: 
  tls.key: 
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: hierocracy-ca-issuer
spec:
  ca:
    secretName: hierocracy-root-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: in-cluster-registry-cert
  namespace: container-registry
spec:
  secretName: in-cluster-registry-tls
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  subject:
    organizations:
      - Hierocracy
  commonName: registry.hierocracy.home
  isCA: false
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  usages:
    - server auth
    - client auth
  dnsNames:
    - registry.hierocracy.home
    - registry.container-registry.svc.cluster.local
    - hierophant.hierocracy.home
  ipAddresses:
    - 172.20.1.26
    - 10.0.0.1
  issuerRef:
    name: hierocracy-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
